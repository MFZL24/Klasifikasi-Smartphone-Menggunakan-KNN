<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Prediksi AI - SmartClass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .history-section {
            padding: 120px 0 80px;
        }

        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            background: var(--glass);
            text-align: left;
            padding: 20px 25px;
            font-family: var(--font-heading);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .history-table td {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .history-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        [data-theme="light"] .history-row:hover {
            background: rgba(0, 0, 0, 0.02);
        }

        .btn-delete {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            background: rgba(255, 0, 0, 0.05);
            color: #ff4d4d;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.2rem;
            line-height: 1;
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: white;
            transform: scale(1.1);
        }

        .history-empty {
            text-align: center;
            padding: 100px 40px;
        }

        .history-empty .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .clear-container {
            margin-top: 30px;
            text-align: right;
        }

        .btn-clear-all {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 0.85rem;
        }

        .btn-clear-all:hover {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4d4d;
            border-color: #ff4d4d;
        }
    </style>
</head>

<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">Smart<span class="gradient-text">Class</span></a>
            <ul class="nav-links">
                <li><a href="/">Manual AI</a></li>
                <li><a href="/explorer">Explorer App</a></li>
                <li><a href="/history" class="active">Riwayat</a></li>
            </ul>
            <div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌓</div>
        </div>
    </nav>

    <main class="history-section container">
        <div style="margin-bottom: 50px; text-align: center;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Riwayat <span class="gradient-text">Prediksi</span></h1>
            <p style="color: var(--text-muted);">Hasil analisis cerdas yang tersimpan secara lokal di perangkat Anda.
            </p>
        </div>

        <div id="historyContainer" class="history-card">
            <!-- Table or Empty Message injected here -->
            <div id="emptyState" class="history-empty">
                <div class="icon">📁</div>
                <h3>Belum Ada Data</h3>
                <p style="color: var(--text-muted); margin-top: 10px;">Silakan lakukan prediksi di halaman Manual atau
                    Explorer.</p>
                <a href="/" class="btn btn-primary" style="margin-top: 30px;">Mulai Analisis</a>
            </div>

            <table id="historyTable" class="history-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Smartphone & Spesifikasi</th>
                        <th>Hasil Klasifikasi</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>

        <div id="clearFooter" class="clear-container" style="display: none;">
            <button onclick="clearHistory()" class="btn btn-clear-all">🗑️ Kosongkan Seluruh Riwayat</button>
        </div>
    </main>

    <script src="/static/script.js"></script>
    <script>
        window.onload = () => {
            renderHistory();
        };

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('smartphone_history') || '[]');
            const table = document.getElementById('historyTable');
            const tbody = document.getElementById('historyBody');
            const empty = document.getElementById('emptyState');
            const footer = document.getElementById('clearFooter');

            if (history.length === 0) {
                empty.style.display = 'block';
                table.style.display = 'none';
                footer.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            table.style.display = 'table';
            footer.style.display = 'block';
            tbody.innerHTML = '';

            // Sort by latest
            const sortedHistory = [...history].reverse();

            sortedHistory.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = 'history-row';

                const dateObj = new Date(item.timestamp);
                const dateStr = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
                const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 700; color: var(--text-main);">${dateStr}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">${timeStr}</div>
                    </td>
                    <td>
                        <div style="font-family: var(--font-heading); font-weight: 700; font-size: 1.1rem; color: var(--text-main);">${item.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">
                            ${item.specs.ram_capacity}GB RAM • ${item.specs.internal_memory}GB Storage • ${item.specs.battery_capacity}mAh
                        </div>
                    </td>
                    <td>
                        <span class="prediction-text badge-${item.prediction.toLowerCase()}" style="font-size: 0.75rem; padding: 6px 14px;">
                            ${item.prediction.toUpperCase()}
                        </span>
                    </td>
                    <td style="text-align: right;">
                        <button onclick="deleteRow(${history.length - 1 - index})" class="btn-delete" title="Hapus">×</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteRow(originalIndex) {
            let history = JSON.parse(localStorage.getItem('smartphone_history') || '[]');
            history.splice(originalIndex, 1);
            localStorage.setItem('smartphone_history', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            if (confirm('Apakah Anda yakin ingin menghapus seluruh riwayat prediksi?')) {
                localStorage.removeItem('smartphone_history');
                renderHistory();
            }
        }
    </script>
</body>

</html>
